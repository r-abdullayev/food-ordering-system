services:
  init-kafka:
    image: confluentinc/cp-kafka:${KAFKA_VERSION}
    depends_on:
      - kafka-broker-1
      - kafka-broker-2
      - kafka-broker-3
    entrypoint: [ '/bin/sh', '-c' ]
    command: |
      "
      export BOOTSTRAP=kafka-broker-1:19092,kafka-broker-2:19092,kafka-broker-3:19092

      until kafka-topics --bootstrap-server $$BOOTSTRAP --list; do
        echo 'Kafka not ready yet, retrying in 5s...'
        sleep 5
      done

      echo -e 'Creating kafka topics (if not exists)'
      kafka-topics --bootstrap-server $$BOOTSTRAP --create --if-not-exists --topic payment-request --replication-factor 3 --partitions 3
      kafka-topics --bootstrap-server $$BOOTSTRAP --create --if-not-exists --topic payment-response --replication-factor 3 --partitions 3
      kafka-topics --bootstrap-server $$BOOTSTRAP --create --if-not-exists --topic restaurant-approval-request --replication-factor 3 --partitions 3
      kafka-topics --bootstrap-server $$BOOTSTRAP --create --if-not-exists --topic restaurant-approval-response --replication-factor 3 --partitions 3
      kafka-topics --bootstrap-server $$BOOTSTRAP --create --if-not-exists --topic customer --replication-factor 3 --partitions 3

      echo -e 'Successfully ensured the following topics exist:'
      kafka-topics --bootstrap-server $$BOOTSTRAP --list
      "
    networks:
      - ${GLOBAL_NETWORK:-food-ordering-system}